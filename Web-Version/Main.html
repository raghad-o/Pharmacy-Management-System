<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Home</title>
        <style>
            body {
                background-color : #e4f3f1;
                background-size :cover;
                background-repeat:  no-repeat ;
                background-attachment:fixed; 
                margin-top: 20px;
            }
             
            .BR{
                background: url(BImage.jpg) center/cover no-repeat;
                position: fixed;
                top: 0%;
                right: 0%;
                width: 45%;
                height: 100vh;
                border-radius: 900px  0px 0px 900px;
                /* top left - top right - bottom right - bottom left */
                overflow : hidden;
                z-index: -1;
            }
            
            .b {
                background-color: #d8f0f1;
                color: black ;
                width: 50%;
                height: 100px;
                border : 1px solid #6ca5c0 ;
                border-radius: 40px;
                font-size: 20px;
                font-family: Tahoma;
                margin: 10px;
                cursor: pointer;
                transition: all 0.35s ease;
                display: flex;
                justify-content: center;
                align-items: center ; 
                gap: 10px;

            } 
            .b img {
                width: 35px;
                height: 35px;  
            }
            .b:hover {
                width: 65%;  
                /* background-color: rgb(226, 235, 238); */
                font-size: 25px;
            }
            h1 {
                background-color: #d8f0f1;
                /* background-color: rgb(226, 235, 238); */
                border : 1px solid #6ca5c0 ;
                width: 58%;
                height: 100px;
                border-radius: 0px 40px 40px 0px;
                display: flex;
                justify-content: center;
                align-items: center ; 
                color: #0c4b68
            }
             
        </style>

    </head>
    <body>
        <div class="BR"></div>
        <br>
        <h1>Welcome to Dawa Managament Home Page</h1>
        <br><br>
       <button onclick = "window.location.href='add.html'" class = "b"><img src = "add.png" alt = "Add">Add</button><br>
            <button onclick = "window.location.href='add.html'" class = "b"><img src = "update.png" alt = "Update">Update</button><br>
            <button onclick = "window.location.href='add.html'" class = "b"><img src = "delete.png" alt = "Delete">Delete</button><br>
            <button onclick = "window.location.href='add.html'" class = "b"><img src = "pill.png" alt = "View">View</button>
    </div>
    </body>
</html>
